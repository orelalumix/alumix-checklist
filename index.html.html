<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#15263a">
<title>צ׳ק־ליסט אלומיניום · מנהלי פרויקטים</title>
<style>
  :root{
    --navy:#000050;
    --navy-2:#00306a;
    --steel:#005090;
    --sky:#5090d0;
    --brass:#5090d0;
    --brass-dim:#3f7bb8;
    --ink:#1a222c;
    --paper:#f3f5f8;
    --card:#ffffff;
    --line:#dde4ec;
    --muted:#67788a;
    --done:#2f8f6b;
    --done-bg:#eef7f2;
    --shadow:0 1px 3px rgba(21,38,58,.08),0 6px 20px rgba(21,38,58,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Rubik,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }

  /* ---------- Header ---------- */
  header{
    background:linear-gradient(115deg,var(--navy) 0%,var(--steel) 62%,var(--sky) 130%);
    color:#fff;
    padding:calc(24px + env(safe-area-inset-top)) 20px 24px;
    position:relative;
    overflow:hidden;
    display:flex;align-items:center;gap:16px;
  }
  header::after{
    content:"";position:absolute;left:-50px;bottom:-50px;
    width:170px;height:170px;border-radius:50%;
    background:radial-gradient(circle,rgba(80,144,208,.28),transparent 70%);
  }
  .logo-tile{
    flex:0 0 auto;position:relative;z-index:2;
    width:76px;height:76px;border-radius:16px;
    background:#fff;box-shadow:0 4px 14px rgba(0,0,20,.25);
    display:flex;align-items:center;justify-content:center;padding:8px;
  }
  .logo-tile img{width:100%;height:100%;object-fit:contain;display:block;}
  header h1{
    margin:0;font-size:21px;font-weight:800;line-height:1.3;
    letter-spacing:-.01em;position:relative;z-index:2;flex:1;
  }

  /* ---------- Progress ---------- */
  .progress-wrap{
    position:sticky;top:0;z-index:20;
    background:rgba(243,245,248,.92);
    backdrop-filter:saturate(1.2) blur(8px);
    -webkit-backdrop-filter:saturate(1.2) blur(8px);
    border-bottom:1px solid var(--line);
    padding:12px 20px;
  }
  .progress-head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:8px;
  }
  .progress-head .label{font-size:13px;font-weight:600;color:var(--navy);}
  .progress-head .count{font-size:13px;font-weight:700;color:var(--steel);}
  .bar{
    height:8px;background:#e3e9f0;border-radius:99px;overflow:hidden;
  }
  .bar span{
    display:block;height:100%;width:0%;
    background:linear-gradient(90deg,var(--brass-dim),var(--brass));
    border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);
  }

  /* ---------- Sections ---------- */
  main{padding:16px 14px 40px;max-width:640px;margin:0 auto;}
  .section{
    background:var(--card);border-radius:16px;box-shadow:var(--shadow);
    margin-bottom:16px;overflow:hidden;border:1px solid var(--line);
  }
  .section-head{
    display:flex;align-items:center;gap:12px;
    padding:15px 16px;cursor:pointer;user-select:none;
    background:linear-gradient(180deg,#fbfcfd,#f6f8fb);
    border-bottom:1px solid var(--line);
  }
  .num{
    flex:0 0 auto;width:34px;height:34px;border-radius:10px;
    background:var(--navy);color:var(--brass);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:16px;
    font-family:Georgia,"Times New Roman",serif;
  }
  .section-head h2{
    margin:0;font-size:16.5px;font-weight:700;color:var(--navy);flex:1;
    letter-spacing:-.01em;
  }
  .section-head .en{
    display:block;font-size:11px;font-weight:600;color:var(--muted);
    letter-spacing:.05em;margin-top:2px;
  }
  .sec-count{
    font-size:12px;font-weight:700;color:var(--steel);
    background:#eef2f7;border-radius:99px;padding:3px 9px;white-space:nowrap;
  }
  .sec-count.complete{background:var(--done-bg);color:var(--done);}
  .chev{
    flex:0 0 auto;color:var(--muted);transition:transform .3s;
  }
  .section.collapsed .chev{transform:rotate(-90deg);}
  .items{
    max-height:2000px;transition:max-height .4s ease;overflow:hidden;
  }
  .section.collapsed .items{max-height:0;}

  /* ---------- Item ---------- */
  .item{
    display:flex;align-items:flex-start;gap:13px;
    padding:14px 16px;
    border-bottom:1px solid #eef2f6;
    cursor:pointer;position:relative;
    transition:background .15s;
  }
  .item:last-child{border-bottom:none;}
  .item:active{background:#f7f9fb;}
  .check{
    flex:0 0 auto;width:26px;height:26px;border-radius:8px;
    border:2px solid var(--line);background:#fff;
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;margin-top:1px;
  }
  .check svg{width:15px;height:15px;stroke:#fff;stroke-width:3.5;
    fill:none;stroke-linecap:round;stroke-linejoin:round;
    opacity:0;transform:scale(.4);transition:all .2s;}
  .item.done .check{background:var(--done);border-color:var(--done);}
  .item.done .check svg{opacity:1;transform:scale(1);}
  .item .txt{
    flex:1;font-size:15px;color:var(--ink);transition:color .2s;
    padding-top:2px;
  }
  .item.done .txt{color:var(--muted);text-decoration:line-through;
    text-decoration-color:rgba(103,120,138,.5);}

  /* ---------- Footer / actions ---------- */
  .quote{
    margin:8px 14px 20px;max-width:640px;
    background:var(--navy);color:#fff;border-radius:16px;
    padding:20px 22px;box-shadow:var(--shadow);
  }
  .quote .q-label{font-size:11px;letter-spacing:.12em;color:var(--brass);
    font-weight:700;text-transform:uppercase;margin-bottom:8px;}
  .quote p{margin:0;font-size:16px;font-weight:600;line-height:1.5;font-style:italic;}

  .actions{max-width:640px;margin:0 auto;padding:0 14px 30px;
    display:flex;gap:10px;}
  .btn{
    flex:1;border:none;border-radius:12px;padding:13px;
    font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;
    transition:transform .1s,background .15s;
  }
  .btn:active{transform:scale(.97);}
  .btn-reset{background:#fff;color:var(--steel);border:1px solid var(--line);}
  .btn-print{background:var(--navy);color:#fff;}

  .credit{text-align:center;font-size:11.5px;color:var(--muted);
    padding:0 20px 30px;}

  /* ---------- Celebration ---------- */
  .done-banner{
    max-width:640px;margin:0 auto 16px;padding:0 14px;
    display:none;
  }
  .done-banner.show{display:block;}
  .done-inner{
    background:var(--done-bg);border:1px solid #bfe3d2;border-radius:14px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;
    color:var(--done);font-weight:600;font-size:14.5px;
  }
  .done-inner .ring{
    width:32px;height:32px;border-radius:50%;background:var(--done);
    color:#fff;display:flex;align-items:center;justify-content:center;
    flex:0 0 auto;font-size:18px;
  }

  @media print{
    .progress-wrap,.actions,.chev,.credit{display:none;}
    .section.collapsed .items{max-height:none;}
    body{background:#fff;}
    .section{break-inside:avoid;box-shadow:none;}
  }
</style>
</head>

      "נבדק פיזית הממשק בין חיפויים / טיח לבין פרופילי האלומיניום למניעת כשלים.",
      "בוצעה הרצה מלאה למנגנוני ההפעלה (תריסים, צלונים, מנועים) לפני המסירה.",
      "התקבלו תיקי מוצר מסודרים לכל מערכת מותקנת."
    ]
  },
  {
    title:"ניהול סיכונים",
    en:"Risk Management",
    items:[
      "\u201Cאיני סומך רק על היועץ\u201D — המעורבות שלי בשטח מונעת \u201Cכיבוי שריפות\u201D מאוחר.",
      "זיהיתי חוסר התאמות בין המתוכנן לבין המתבצע בפועל ביציקות הבטון."
    ]
  }
];

const STORE_KEY = "alu_checklist_v1";
let state = {};
try { state = JSON.parse(localStorage.getItem(STORE_KEY)) || {}; } catch(e){ state = {}; }

const app = document.getElementById("app");
let total = 0;

DATA.forEach((sec,si)=>{
  const secEl = document.createElement("section");
  secEl.className = "section";
  secEl.dataset.si = si;

  const head = document.createElement("div");
  head.className = "section-head";
  head.innerHTML =
    `<div class="num">${si+1}</div>
     <h2>${sec.title}<span class="en">${sec.en}</span></h2>
     <span class="sec-count" id="sc-${si}"></span>
     <svg class="chev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>`;
  head.addEventListener("click",()=>secEl.classList.toggle("collapsed"));
  secEl.appendChild(head);

  const itemsWrap = document.createElement("div");
  itemsWrap.className = "items";

  sec.items.forEach((txt,ii)=>{
    total++;
    const key = `${si}-${ii}`;
    const item = document.createElement("div");
    item.className = "item" + (state[key] ? " done" : "");
    item.dataset.key = key;
    item.innerHTML =
      `<div class="check"><svg viewBox="0 0 24 24"><polyline points="4 12 10 18 20 6"></polyline></svg></div>
       <div class="txt">${txt}</div>`;
    item.addEventListener("click",()=>{
      const on = !item.classList.contains("done");
      item.classList.toggle("done",on);
      state[key] = on;
      save();
      updateProgress();
    });
    itemsWrap.appendChild(item);
  });

  secEl.appendChild(itemsWrap);
  app.appendChild(secEl);
});

document.getElementById("totalCount").textContent = total;

function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
}

function updateProgress(){
  let done = 0;
  DATA.forEach((sec,si)=>{
    let secDone = 0;
    sec.items.forEach((_,ii)=>{ if(state[`${si}-${ii}`]) { done++; secDone++; } });
    const sc = document.getElementById("sc-"+si);
    sc.textContent = `${secDone}/${sec.items.length}`;
    sc.classList.toggle("complete", secDone===sec.items.length);
  });
  document.getElementById("doneCount").textContent = done;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById("barFill").style.width = pct + "%";
  document.getElementById("doneBanner").classList.toggle("show", done===total && total>0);
}

document.getElementById("resetBtn").addEventListener("click",()=>{
  if(!confirm("לאפס את כל הסימונים?")) return;
  state = {}; save();
  document.querySelectorAll(".item.done").forEach(el=>el.classList.remove("done"));
  updateProgress();
});

document.getElementById("printBtn").addEventListener("click",()=>{
  document.querySelectorAll(".section.collapsed").forEach(s=>s.classList.remove("collapsed"));
  setTimeout(()=>window.print(),150);
});

updateProgress();
</script>
</body>
</html>
